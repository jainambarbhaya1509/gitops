apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-secret
  namespace: prod
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: dockerhub-secret-shared
    creationPolicy: Owner

    template:
      type: kubernetes.io/dockerconfigjson

      data:
        .dockerconfigjson: |
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }

  data:
    - secretKey: username
      remoteRef:
        key: dockerhub
        property: username

    - secretKey: password
      remoteRef:
        key: dockerhub
        property: password