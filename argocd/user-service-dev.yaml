apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: user-service-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/jainambarbhaya1509/gitops.git
    targetRevision: HEAD
    path: charts/user-service

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true