replicaCount: 3

image:
  repository: jainambarbhaya15/user-service
  tag: "15"

imagePullSecrets:
  - name: dockerhub-secret-shared

ingress:
  enabled: true
  className: nginx

  hosts:
    - host: api.company.com
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true

  minReplicas: 3
  maxReplicas: 10

  targetCPUUtilizationPercentage: 80


